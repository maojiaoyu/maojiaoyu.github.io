name: Auto friend link

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: friend-link-updates
  cancel-in-progress: false

jobs:
  update-friends:
    if: >-
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request == null)
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      issues: write

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Playwright
        run: |
          mkdir -p /tmp/iris-friend-link
          bun add --cwd /tmp/iris-friend-link playwright@1.55.0
          /tmp/iris-friend-link/node_modules/.bin/playwright install --with-deps chromium

      - name: Process friend request
        uses: actions/github-script@v7
        env:
          NODE_PATH: /tmp/iris-friend-link/node_modules
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const path = require('node:path')
            const handler = require(path.join(
              process.env.GITHUB_WORKSPACE,
              '.github/scripts/process-friend-request.cjs'
            ))
            await handler({ github, context, core })
